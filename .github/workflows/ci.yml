name: Java Maven Build

on:
  push:
    branches: [ "main" ]

jobs:
  compilacion:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y empaquetar
        run: mvn clean compile

  pruebas:
    runs-on: ${{ matrix.os }}
    needs: compilacion
    strategy:
      matrix:
        java: [17, 21, 25]                                  # variable "java" con las versiones. Se podría llamar de otra forma.
        os: [ubuntu-latest, windows-latest, macos-latest]   # variable "os" con los nombres de los OSs.

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Testear
        run: mvn clean test